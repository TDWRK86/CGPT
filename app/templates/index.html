<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tender Intake PoC</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f4f6f9;
            color: #222;
            min-height: 100vh;
        }

        header {
            background: #1a3a5c;
            color: white;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: .3px; }

        .load-btn {
            background: #e8a020;
            color: white;
            border: none;
            padding: 9px 20px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }
        .load-btn:hover { background: #cf8b18; }
        .load-btn:disabled { background: #999; cursor: not-allowed; }

        #load-status {
            font-size: 0.82rem;
            color: #c8daf0;
            margin-left: 12px;
        }

        .main {
            display: flex;
            gap: 0;
            height: calc(100vh - 56px);
        }

        /* ---- FILTER SIDEBAR ---- */
        .sidebar {
            width: 270px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #dde3ec;
            padding: 20px 16px;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: #888;
            margin-bottom: 16px;
        }

        .filter-group { margin-bottom: 18px; }

        .filter-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 5px;
        }

        .filter-group input[type="text"],
        .filter-group input[type="number"],
        .filter-group input[type="date"] {
            width: 100%;
            padding: 7px 9px;
            border: 1px solid #ccd3de;
            border-radius: 4px;
            font-size: 0.82rem;
            color: #222;
            outline: none;
            transition: border-color .15s;
        }
        .filter-group input:focus { border-color: #1a3a5c; }

        .row2 { display: flex; gap: 8px; }
        .row2 input { width: 50%; }

        .checkbox-group { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
        .checkbox-group label { font-weight: 400; font-size: 0.82rem; display: flex; align-items: center; gap: 6px; cursor: pointer; }

        .clear-btn {
            width: 100%;
            padding: 8px;
            background: none;
            border: 1px solid #ccd3de;
            border-radius: 4px;
            font-size: 0.8rem;
            color: #555;
            cursor: pointer;
            margin-top: 4px;
            transition: background .15s;
        }
        .clear-btn:hover { background: #f0f3f7; }

        /* ---- TABLE AREA ---- */
        .content {
            flex: 1;
            overflow: auto;
            padding: 20px 24px;
        }

        .toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        #result-count {
            font-size: 0.82rem;
            color: #666;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
            background: #fff;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,.08);
        }

        thead th {
            background: #1a3a5c;
            color: #fff;
            text-align: left;
            padding: 10px 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        tbody tr:nth-child(even) { background: #f8fafc; }
        tbody tr:hover { background: #eef3fa; }

        td {
            padding: 9px 12px;
            vertical-align: top;
            border-bottom: 1px solid #eaeef4;
        }

        td.desc { max-width: 520px; color: #444; line-height: 1.4; }
        td.value { white-space: nowrap; }
        td.stage span {
            display: inline-block;
            background: #dde8f5;
            color: #1a3a5c;
            border-radius: 3px;
            padding: 1px 6px;
            font-size: 0.75rem;
            margin: 1px 2px 1px 0;
        }
        td.cpv { color: #666; font-size: 0.75rem; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #ccd3de;
            border-top-color: #1a3a5c;
            border-radius: 50%;
            animation: spin .6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <h1>📋 Tender Intake — Proof of Concept</h1>
    <div style="display:flex;align-items:center;">
        <button class="load-btn" id="loadBtn" onclick="loadOpportunities()">Load today's opportunities</button>
        <span id="load-status"></span>
    </div>
</header>

<div class="main">

    <!-- FILTER SIDEBAR -->
    <aside class="sidebar">
        <h2>Filters</h2>

        <div class="filter-group">
            <label>CPV Prefixes</label>
            <input type="text" id="f-cpv" placeholder="e.g. 30, 48, 72" oninput="debouncedFetch()">
            <div style="font-size:0.72rem;color:#999;margin-top:3px;">Comma-separated prefixes</div>
        </div>

        <div class="filter-group">
            <label>Contract Value (£)</label>
            <div class="row2">
                <input type="number" id="f-min" placeholder="Min" oninput="debouncedFetch()">
                <input type="number" id="f-max" placeholder="Max" oninput="debouncedFetch()">
            </div>
        </div>

        <div class="filter-group">
            <label>Stage / Tags</label>
            <div class="checkbox-group" id="stage-checkboxes">
                <!-- populated from data -->
            </div>
        </div>

        <div class="filter-group">
            <label>Buyer Name</label>
            <input type="text" id="f-buyer" placeholder="Search buyer…" oninput="debouncedFetch()">
        </div>

        <div class="filter-group">
            <label>Published Date</label>
            <div class="row2">
                <input type="date" id="f-date-from" onchange="debouncedFetch()">
                <input type="date" id="f-date-to" onchange="debouncedFetch()">
            </div>
        </div>

        <button class="clear-btn" onclick="clearFilters()">Clear all filters</button>
    </aside>

    <!-- TABLE -->
    <main class="content">
        <div class="toolbar">
            <span id="result-count">—</span>
        </div>
        <div id="table-container">
            <div class="empty-state">Click <strong>Load today's opportunities</strong> to fetch data, then use the filters to narrow results.</div>
        </div>
    </main>
</div>

<script>
    // Known stage tags to show as checkboxes.
    // Once data loads we'll supplement with any we see in the data.
    const KNOWN_STAGES = [
        "tender", "tenderUpdate", "preQualification",
        "planning", "planningUpdate",
        "award", "awardUpdate", "contract", "contractUpdate",
    ];

    let allData = [];           // full CSV (loaded lazily on first filter)
    let stagesPopulated = false;

    // ---- LOAD ----
    async function loadOpportunities() {
        const btn = document.getElementById("loadBtn");
        const status = document.getElementById("load-status");
        btn.disabled = true;
        btn.textContent = "Loading…";
        status.textContent = "";

        try {
            const resp = await fetch("/load", { method: "POST" });
            const data = await resp.json();
            status.textContent = `✓ ${data.new_saved} new record(s) saved (${data.total_fetched} fetched)`;
        } catch (e) {
            status.textContent = "⚠ Load failed";
        } finally {
            btn.disabled = false;
            btn.textContent = "Load today's opportunities";
        }

        // refresh the table with current filters after loading
        await fetchAndRender();
    }

    // ---- FILTER FETCH ----
    async function fetchAndRender() {
        const params = new URLSearchParams();

        const cpv = document.getElementById("f-cpv").value.trim();
        if (cpv) params.set("cpv_prefixes", cpv);

        const minV = document.getElementById("f-min").value;
        if (minV) params.set("min_value", minV);

        const maxV = document.getElementById("f-max").value;
        if (maxV) params.set("max_value", maxV);

        const checkedStages = [...document.querySelectorAll("#stage-checkboxes input:checked")]
            .map(cb => cb.value);
        if (checkedStages.length) params.set("stages", checkedStages.join(","));

        const buyer = document.getElementById("f-buyer").value.trim();
        if (buyer) params.set("buyer", buyer);

        const dateFrom = document.getElementById("f-date-from").value;
        if (dateFrom) params.set("date_from", dateFrom);

        const dateTo = document.getElementById("f-date-to").value;
        if (dateTo) params.set("date_to", dateTo);

        const container = document.getElementById("table-container");
        container.innerHTML = `<div class="empty-state"><span class="spinner"></span>Fetching…</div>`;

        try {
            const resp = await fetch("/opportunities?" + params.toString());
            const data = await resp.json();
            allData = data;
            populateStages(data);
            renderTable(data);
        } catch (e) {
            container.innerHTML = `<div class="empty-state">⚠ Error fetching data.</div>`;
        }
    }

    // ---- RENDER TABLE ----
    function renderTable(data) {
        const container = document.getElementById("table-container");
        document.getElementById("result-count").textContent =
            `${data.length} opportunit${data.length === 1 ? "y" : "ies"}`;

        if (!data.length) {
            container.innerHTML = `<div class="empty-state">No opportunities match the current filters.</div>`;
            return;
        }

        const fmt = v => {
            const n = parseFloat(v);
            return isNaN(n) ? "—" : "£" + n.toLocaleString("en-GB");
        };

        const rows = data.map(o => {
            const stages = (o.stage || "").split(",").filter(Boolean)
                .map(s => `<span>${s.trim()}</span>`).join("");
            return `
            <tr>
                <td><input type="checkbox"></td>
                <td>${esc(o.title || "—")}</td>
                <td>${esc(o.buyer || "—")}</td>
                <td class="value">${fmt(o.value)}</td>
                <td class="stage">${stages}</td>
                <td class="cpv">${esc(o.cpvs || "—")}</td>
                <td class="desc">${esc(o.description || "")}</td>
                <td>${(o.published_date || "").substring(0, 10)}</td>
            </tr>`;
        }).join("");

        container.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th></th>
                    <th>Title</th>
                    <th>Buyer</th>
                    <th>Value</th>
                    <th>Stage</th>
                    <th>CPVs</th>
                    <th>Description</th>
                    <th>Published</th>
                </tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;
    }

    // ---- STAGE CHECKBOXES ----
    function populateStages(data) {
        if (stagesPopulated) return;

        // Collect all unique stages seen in data + known list
        const seen = new Set(KNOWN_STAGES);
        data.forEach(o => {
            (o.stage || "").split(",").forEach(s => { if (s.trim()) seen.add(s.trim()); });
        });

        const el = document.getElementById("stage-checkboxes");
        el.innerHTML = [...seen].sort().map(s => `
            <label>
                <input type="checkbox" value="${s}" onchange="debouncedFetch()">
                ${s}
            </label>`).join("");

        stagesPopulated = true;
    }

    // ---- CLEAR ----
    function clearFilters() {
        ["f-cpv","f-min","f-max","f-buyer","f-date-from","f-date-to"]
            .forEach(id => document.getElementById(id).value = "");
        document.querySelectorAll("#stage-checkboxes input").forEach(cb => cb.checked = false);
        fetchAndRender();
    }

    // ---- DEBOUNCE ----
    let debounceTimer;
    function debouncedFetch() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(fetchAndRender, 350);
    }

    // ---- ESCAPE ----
    function esc(str) {
        return String(str)
            .replace(/&/g,"&amp;").replace(/</g,"&lt;")
            .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Auto-load table on page open (shows whatever is in CSV already)
    fetchAndRender();
</script>

</body>
</html>
